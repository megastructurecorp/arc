name: CI

# Arc CI — runs on every push to main and every pull request.
#
# What gets checked:
#   1. Package installs cleanly from source via `pip install -e .`
#      (exercises pyproject.toml / hatchling build backend)
#   2. `arc --version` prints correctly from the installed console script
#   3. Full unit test suite (tests/) — exercises the hub, the client,
#      the file relay, and the smoke-agent runner end-to-end
#   4. CLI smoke — start a real hub, post a message, poll it back, stop
#      (exercises the packaged CLI, not just the test harness internals)
#   5. Version sync — arc.py __version__ must equal package.json version
#   6. npm shim smoke — node bin/arc.js --version must succeed end-to-end,
#      proving the JS shim can locate Python and forward argv
#
# Matrix is deliberately narrow to keep CI time under a few minutes:
# all four supported Python versions on Linux (the most common deploy
# target), plus the latest Python on macOS and Windows to catch
# platform-specific bugs in subprocess / path / stdio handling.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} · Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  python: "3.10" }
          - { os: ubuntu-latest,  python: "3.11" }
          - { os: ubuntu-latest,  python: "3.12" }
          - { os: ubuntu-latest,  python: "3.13" }
          - { os: macos-latest,   python: "3.13" }
          - { os: windows-latest, python: "3.13" }

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install arc from source
        run: pip install -e .

      - name: Print installed version
        run: arc --version

      - name: Run test suite
        run: python -m unittest discover -s tests -v

      - name: Arc CLI smoke — start, post, poll, stop
        shell: bash
        run: |
          # We deliberately do NOT use `arc ensure` here. `arc ensure`
          # uses subprocess.Popen with stderr=DEVNULL and
          # start_new_session=True, which on macOS framework Python can
          # silently hang or detach the hub child without surfacing any
          # error. Starting the hub in the foreground with `&` keeps
          # stderr attached to the CI log, so any startup error is
          # visible immediately.

          # Belt-and-braces cleanup in case the unit tests (which ran in
          # the previous step) leaked a stale .arc.pid or sqlite WAL.
          rm -f .arc.pid arc.sqlite3 arc.sqlite3-shm arc.sqlite3-wal

          # Start the hub in the background. stderr inherits the CI
          # log so any traceback from the hub appears in this step.
          arc --port 6969 --storage arc.sqlite3 --quiet &
          HUB_PID=$!
          echo "spawned hub pid=$HUB_PID"

          # Poll for readiness up to 30 seconds, but bail early if the
          # process dies — that gives a concrete error instead of a
          # generic timeout.
          ready=0
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:6969/v1/hub-info >/dev/null 2>&1; then
              echo "hub responsive after ${i}s"
              ready=1
              break
            fi
            if ! kill -0 $HUB_PID 2>/dev/null; then
              echo "hub pid $HUB_PID died after ${i}s — see stderr above"
              wait $HUB_PID 2>/dev/null
              exit 1
            fi
            sleep 1
          done

          if [ $ready -ne 1 ]; then
            echo "=== hub still not responsive after 30s; diagnostics ==="
            ps -p $HUB_PID -o pid,ppid,stat,etime,command || true
            (lsof -nP -i :6969 2>/dev/null \
              || netstat -an 2>/dev/null | grep 6969) || echo "(nothing on 6969)"
            kill -9 $HUB_PID 2>/dev/null || true
            exit 1
          fi

          arc post --agent ci-smoke --base-url http://127.0.0.1:6969 "hello from CI on ${{ matrix.os }}"
          arc poll --agent ci-smoke --base-url http://127.0.0.1:6969 --timeout 3 --include-self

          # Clean shutdown, then wait for the process to exit so its
          # final stderr (if any) makes it into the log.
          kill $HUB_PID 2>/dev/null || true
          wait $HUB_PID 2>/dev/null || true

      - name: Version sync — arc.py __version__ matches package.json version
        shell: python
        run: |
          import json, re, sys
          py_src = open('arc.py', encoding='utf-8').read()
          py_ver = re.search(r'__version__\s*=\s*"([^"]+)"', py_src).group(1)
          js_ver = json.load(open('package.json', encoding='utf-8'))['version']
          print(f"arc.py:       {py_ver}")
          print(f"package.json: {js_ver}")
          if py_ver != js_ver:
              sys.exit(f"version mismatch: arc.py={py_ver} package.json={js_ver}")
          print("versions in sync")

  npm-shim:
    name: npm shim smoke (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Shim forwards --version to bundled arc.py
        run: node bin/arc.js --version
